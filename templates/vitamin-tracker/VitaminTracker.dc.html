<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Vitamin Tracker Shell" description="Branded 비타민 체크 달력 dashboard shell — header, per-person stats, and dose-rate bars." -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
</helmet>
<div style="max-width:720px;margin:0 auto;padding:2rem 1rem 3rem;font-family:var(--font-body);color:var(--text);background:var(--bg);min-height:100vh;box-sizing:border-box;">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:40px;height:40px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">💊</div>
      <div>
        <h1 style="font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.3px;margin:0;color:var(--text);">비타민 체크 달력</h1>
        <p style="font-size:12px;color:var(--text-muted);margin:1px 0 0;">정화 &amp; 해인의 매일 비타민</p>
      </div>
    </div>
    <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.SyncBadge" status="ok" hint-size="120px,28px"></x-import>
  </div>

  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem;">
    <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.StatGroup" person="junghwa" name="정화" dc-props="{{ jStats }}" hint-size="100%,120px"></x-import>
    <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.StatGroup" person="haein" name="해인" dc-props="{{ hStats }}" hint-size="100%,120px"></x-import>
  </div>

  <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.Card" padding="sm" hint-size="100%,90px">
    <div style="display:flex;flex-direction:column;gap:10px;">
      <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.ProgressBar" person="junghwa" label="정화 복용률" value="{{ jPct }}" hint-size="100%,30px"></x-import>
      <x-import component-from-global-scope="VitaminCalendarDesignSystem_00e06a.ProgressBar" person="haein" label="해인 복용률" value="{{ hPct }}" hint-size="100%,30px"></x-import>
    </div>
  </x-import>

  <p style="text-align:center;font-size:11px;color:var(--text-faint);margin-top:1.5rem;">✦ Netlify Blobs 저장 · 30초마다 자동 동기화 ✦</p>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      jStats: { stats: [{ value: 18, label: '복용 완료' }, { value: 6, label: '연속 복용일' }] },
      hStats: { stats: [{ value: 15, label: '복용 완료' }, { value: 3, label: '연속 복용일' }] },
      jPct: 82,
      hPct: 64,
    };
  }
}
</script>
</body>
</html>
