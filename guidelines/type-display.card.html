<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-display);padding:16px;color:var(--text);}
  .a{font-size:28px;font-weight:700;letter-spacing:-.3px;}
  .b{font-size:16px;font-weight:500;color:var(--text-muted);margin-top:4px;}
  .n{font-size:40px;font-weight:700;color:var(--accent);line-height:1;margin-top:8px;}
  code{font-family:var(--font-body);font-size:10px;color:var(--text-faint);}
</style></head><body>
<div class="a">비타민 체크 달력</div>
<div class="b">2026년 6월 · Gmarket Sans</div>
<div class="n">18 <span style="color:var(--accent-2)">15</span></div>
<code>--font-display · 700 / 500 — numerals &amp; headings</code>
</body></html>
