<!-- @dsCard group="Colors" viewport="700x150" name="Text & status" subtitle="Ink ramp + status dots" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;display:flex;gap:24px;align-items:center;}
  .ink{display:flex;gap:18px;align-items:baseline;}
  .ink span{font-size:18px;font-weight:500;}
  .status{display:flex;gap:16px;}
  .st{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-muted);}
  .dot{width:11px;height:11px;border-radius:50%;}
  .lbl{font-size:9px;color:var(--text-faint);display:block;}
</style></head><body>
<div class="ink">
  <div><span style="color:var(--text)">텍스트</span><code class="lbl">text</code></div>
  <div><span style="color:var(--text-muted)">텍스트</span><code class="lbl">muted</code></div>
  <div><span style="color:var(--text-faint)">텍스트</span><code class="lbl">faint</code></div>
</div>
<div class="status">
  <div class="st"><span class="dot" style="background:var(--status-ok)"></span>ok<code class="lbl">#6dbf8a</code></div>
  <div class="st"><span class="dot" style="background:var(--status-loading)"></span>loading<code class="lbl">#f0c55a</code></div>
  <div class="st"><span class="dot" style="background:var(--status-error)"></span>error<code class="lbl">#c06b50</code></div>
</div>
</body></html>
