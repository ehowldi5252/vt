<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4 · 6 · 10 · 12 · 16 · 20 · 28" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;display:flex;gap:14px;align-items:flex-end;}
  .col{text-align:center;}
  .bar{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:4px;width:28px;}
  .t{font-size:10px;color:var(--text-muted);margin-top:6px;}
</style></head><body>
  <div class="col"><div class="bar" style="height:4px"></div><div class="t">1 · 4</div></div>
  <div class="col"><div class="bar" style="height:6px"></div><div class="t">2 · 6</div></div>
  <div class="col"><div class="bar" style="height:10px"></div><div class="t">3 · 10</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="t">4 · 12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="t">5 · 16</div></div>
  <div class="col"><div class="bar" style="height:20px"></div><div class="t">6 · 20</div></div>
  <div class="col"><div class="bar" style="height:28px"></div><div class="t">7 · 28</div></div>
</body></html>
