<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & lines" subtitle="Warm paper neutrals" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;}
  .sw{display:flex;gap:10px;}
  .chip{flex:1;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
  .block{height:56px;}
  .meta{padding:6px 8px;font-size:11px;color:var(--text);background:var(--surface);}
  .meta b{display:block;font-weight:500;}
  .meta code{color:var(--text-muted);font-size:10px;}
</style></head><body>
<div class="sw">
  <div class="chip"><div class="block" style="background:var(--bg)"></div><div class="meta"><b>bg</b><code>#f8f8f4</code></div></div>
  <div class="chip"><div class="block" style="background:var(--surface)"></div><div class="meta"><b>surface</b><code>#ffffff</code></div></div>
  <div class="chip"><div class="block" style="background:var(--surface-2)"></div><div class="meta"><b>surface-2</b><code>#f1f2ec</code></div></div>
  <div class="chip"><div class="block" style="background:var(--weekend-bg)"></div><div class="meta"><b>weekend-bg</b><code>#f2f4ee</code></div></div>
  <div class="chip"><div class="block" style="background:var(--border)"></div><div class="meta"><b>border</b><code>#e8e7dc</code></div></div>
</div>
</body></html>
