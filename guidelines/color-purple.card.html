<!-- @dsCard group="Colors" viewport="700x150" name="정화 · Matcha" subtitle="Primary accent — Junghwa" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;}
  .sw{display:flex;gap:10px;}
  .chip{flex:1;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
  .block{height:56px;}
  .meta{padding:6px 8px;font-size:11px;color:var(--text);background:var(--surface);}
  .meta b{display:block;font-weight:500;}
  .meta code{color:var(--text-muted);font-size:10px;}
</style></head><body>
<div class="sw">
  <div class="chip"><div class="block" style="background:var(--accent)"></div><div class="meta"><b>accent</b><code>#BACD92</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-mid)"></div><div class="meta"><b>accent-mid</b><code>#cfe0a8</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-light)"></div><div class="meta"><b>accent-light</b><code>#eef4e2</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-deep)"></div><div class="meta" style="color:#fff;background:var(--accent-deep)"><b>accent-deep</b><code style="color:rgba(255,255,255,.7)">#5f7a35</code></div></div>
</div>
</body></html>
