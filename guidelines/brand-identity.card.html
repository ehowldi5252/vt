<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
  .lock{display:flex;align-items:center;gap:12px;}
  .logo{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
  h1{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--text);margin:0;}
  p{font-size:12px;color:var(--text-muted);margin:2px 0 0;}
  .tints{display:flex;gap:8px;}
  .tile{width:46px;height:46px;border-radius:8px;border:1px solid var(--accent-mid);}
  .both{background:linear-gradient(135deg,var(--accent-light) 50%,var(--accent-2-light) 50%);}
  .j{background:var(--accent-light);}
  .h{background:var(--accent-2-light);border-color:var(--accent-2-mid);}
  .cap{font-size:9px;color:var(--text-faint);text-align:center;margin-top:4px;}
</style></head><body>
  <div class="lock">
    <div class="logo">💊</div>
    <div><h1>비타민 체크 달력</h1><p>정화 &amp; 해인의 매일 비타민</p></div>
  </div>
  <div class="tints">
    <div><div class="tile both"></div><div class="cap">둘 다</div></div>
    <div><div class="tile j"></div><div class="cap">정화</div></div>
    <div><div class="tile h"></div><div class="cap">해인</div></div>
  </div>
</body></html>
