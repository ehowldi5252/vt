<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & borders" subtitle="12 / 8 / 6 / pill · 1px hairlines" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;display:flex;gap:16px;align-items:center;}
  .box{width:74px;height:74px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:var(--text-muted);}
  .pill{width:90px;height:34px;border-radius:99px;background:var(--accent-light);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent);}
</style></head><body>
  <div class="box" style="border-radius:12px">12 card</div>
  <div class="box" style="border-radius:8px">8 cell</div>
  <div class="box" style="border-radius:6px">6 chip</div>
  <div class="pill">99 pill</div>
</body></html>
