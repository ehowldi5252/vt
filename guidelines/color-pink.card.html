<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:16px;}
  .sw{display:flex;gap:10px;}
  .chip{flex:1;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
  .block{height:56px;}
  .meta{padding:6px 8px;font-size:11px;color:var(--text);background:var(--surface);}
  .meta b{display:block;font-weight:500;}
  .meta code{color:var(--text-muted);font-size:10px;}
</style></head><body>
<div class="sw">
  <div class="chip"><div class="block" style="background:var(--accent-2)"></div><div class="meta"><b>accent-2</b><code>#F5DAD2</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-2-mid)"></div><div class="meta"><b>accent-2-mid</b><code>#f6c9bd</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-2-light)"></div><div class="meta"><b>accent-2-light</b><code>#fdf3ef</code></div></div>
  <div class="chip"><div class="block" style="background:var(--accent-2-deep)"></div><div class="meta" style="color:#fff;background:var(--accent-2-deep)"><b>accent-2-deep</b><code style="color:rgba(255,255,255,.7)">#c06b50</code></div></div>
</div>
</body></html>
