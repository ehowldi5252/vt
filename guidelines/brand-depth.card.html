<!-- @dsCard group="Brand" viewport="700x150" name="Shadows & motion" subtitle="Near-flat depth · soft pop" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-body);padding:18px;display:flex;gap:18px;align-items:center;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:120px;height:64px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);}
  .s1{box-shadow:var(--shadow-soft);}
  .s2{box-shadow:var(--shadow-card);}
  .s3{box-shadow:var(--shadow-pop);}
  .pop{animation:vc-pop 1.4s var(--ease-out) infinite;}
</style></head><body>
  <div class="card s1">soft</div>
  <div class="card s2">card</div>
  <div class="card s3">pop</div>
  <div class="card pop" style="background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)">vc-pop ✓</div>
</body></html>
